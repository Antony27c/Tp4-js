<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/productos.css">
    <title>Filtrado de productos</title>
</head>
<body>
    
    <h1>Productos</h1>

    <div class="filtros">
        <div>
            <label>Categoria</label><br>
            <select id="selectCategoria">
                <option value="todas">Todas</option>
                <option value="electronica">electronica</option>
                <option value="ropa">Ropa</option>
                <option value="hogar">Hogar</option>
            </select>
        </div>
    </div>
    <div>
        <label>Precio Maximo: $<span id="valorPrecio">1000</span></label><br>
        <input type="range" id="rangePrecio" min="0" max="1000" value="1000">
    </div>
    <div>
        <label>
            <input type="checkbox" id="checkStock"> Solo en stonck
        </label>
    </div>
    <div>
        <label>Buscar</label><br>
        <input type="text" id="inputBusqueda" placeholder="Nombre del producto">
    </div>

    <div class="tarjetas" id="contenedor"></div>
    <script src="js/productos.js"></script>


</body>
</html>
